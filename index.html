<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Vault</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            color:#222;
        }

        header{
            background:#2563eb;
            color:white;
            padding:20px;
            text-align:center;
        }

        h1{
            font-size:42px;
        }

        p{
            margin-top:10px;
        }

        .container{
            max-width:1000px;
            margin:40px auto;
            padding:20px;
        }

        input{
            width:100%;
            padding:15px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:18px;
            margin-bottom:30px;
        }

        .subjects{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card:hover{
            transform:translateY(-5px);
        }

        footer{
            text-align:center;
            padding:40px;
            color:#777;
        }
    </style>
</head>

<body>

<header>
    <h1>IB Vault</h1>
    <p>Your free revision resource.</p>
</header>

<div class="container">

    <input type="text" placeholder="Search for a subject...">

    <div class="subjects">
        <div class="card">Mathematics</div>
        <div class="card">Physics</div>
        <div class="card">Chemistry</div>
        <div class="card">Biology</div>
        <div class="card">Economics</div>
        <div class="card">Computer Science</div>
    </div>

</div>

<footer>
    © 2026 IB Vault
</footer>

</body>
</html>
